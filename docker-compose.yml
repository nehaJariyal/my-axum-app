services:
  postgres:
    image: postgres:16-alpine
    container_name: myaxumapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myaxumapp -d myaxumapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: myaxumapp-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

  redis:
    image: redis:7-alpine
    container_name: myaxumapp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    container_name: myaxumapp-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: myaxumapp-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"

  aeron:
    build:
      context: ./docker/aeron
    container_name: myaxumapp-aeron
    restart: unless-stopped
    shm_size: 512mb
    ipc: shareable
    volumes:
      - aeron_data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/aeron/cnc.dat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  aeron-viewer:
    build:
      context: ./docker/aeron-viewer
    container_name: myaxumapp-aeron-viewer
    restart: unless-stopped
    depends_on:
      aeron:
        condition: service_healthy
    ipc: service:aeron
    volumes:
      - aeron_data:/data
    ports:
      - "8070:8080"
    environment:
      AERON_DIR: /data/aeron
      AERON_CHANNEL: aeron:ipc
      AERON_STREAM_ID: ${AERON_STREAM_ID:-1001}

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myaxumapp-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      aeron:
        condition: service_healthy
      aeron-viewer:
        condition: service_started
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Docker network hostnames (override .env localhost values)
      DATABASE_URL: postgres://${POSTGRES_USER}:admin%40123@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:admin%40123@redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      AERON_DIR: /data/aeron
      AERON_CHANNEL: aeron:ipc
      AERON_STREAM_ID: ${AERON_STREAM_ID:-1001}
      AERON_PUBLISH_URL: http://aeron-viewer:8080/api/publish
      MIGRATIONS_DIR: /app/migrations
    volumes:
      - aeron_data:/data
    shm_size: 256mb

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  aeron_data:
